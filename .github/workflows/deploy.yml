name: Deploy Admin to Timeweb

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: 89.223.70.219
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/lunda-admin
            git pull origin main
            venv/bin/pip install -r requirements.txt --quiet
            systemctl restart lunda-admin
