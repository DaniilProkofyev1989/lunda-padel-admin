{% extends "base.html" %}
{% block title %}Events - Lunda Admin{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h3>Events <span class="text-muted fs-6">({{ total }})</span></h3>
</div>

<div class="card mb-3">
    <div class="card-body py-2">
        <form class="row g-2 align-items-end" hx-get="/events" hx-target="#events-table" hx-push-url="true">
            <div class="col-auto">
                <label class="form-label small mb-0">City</label>
                <select name="city" class="form-select form-select-sm">
                    <option value="">All</option>
                    {% for c in filters.cities %}
                    <option value="{{ c }}" {% if current_filters.city == c %}selected{% endif %}>{{ c }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-auto">
                <label class="form-label small mb-0">Status</label>
                <select name="status" class="form-select form-select-sm">
                    <option value="">All</option>
                    {% for s in filters.statuses %}
                    <option value="{{ s }}" {% if current_filters.status == s %}selected{% endif %}>{{ s }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-auto">
                <label class="form-label small mb-0">Type</label>
                <select name="type" class="form-select form-select-sm">
                    <option value="">All</option>
                    {% for t in filters.types %}
                    <option value="{{ t }}" {% if current_filters.type == t %}selected{% endif %}>{{ t }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-auto">
                <label class="form-label small mb-0">Min Grade</label>
                <select name="grade" class="form-select form-select-sm">
                    <option value="">All</option>
                    {% for g in filters.grades %}
                    <option value="{{ g }}" {% if current_filters.grade == g %}selected{% endif %}>{{ g }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-auto">
                <button type="submit" class="btn btn-primary btn-sm">Filter</button>
                <a href="/events" class="btn btn-outline-secondary btn-sm">Reset</a>
            </div>
        </form>
    </div>
</div>

<div id="events-table">
    {% include "_events_table.html" %}
</div>
{% endblock %}
