<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Lunda Admin{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <style>
        .sidebar { min-height: 100vh; background: #212529; }
        .sidebar a { color: #adb5bd; text-decoration: none; padding: 10px 20px; display: block; }
        .sidebar a:hover, .sidebar a.active { color: #fff; background: #343a40; }
        .stat-card { border-left: 4px solid; }
        .stat-card.primary { border-color: #0d6efd; }
        .stat-card.success { border-color: #198754; }
        .stat-card.warning { border-color: #ffc107; }
        .stat-card.danger { border-color: #dc3545; }
        .badge-planned { background: #0d6efd; }
        .badge-finished { background: #198754; }
        .badge-cancelled { background: #dc3545; }
        pre.json-pre { background: #f8f9fa; padding: 15px; border-radius: 8px; max-height: 600px; overflow: auto; font-size: 0.85em; }
    </style>
</head>
<body>
    <div class="d-flex">
        {% block sidebar %}
        <nav class="sidebar d-flex flex-column" style="width: 220px;">
            <div class="p-3 text-white fw-bold fs-5">Lunda Admin</div>
            <a href="/" class="{% if request.url.path == '/' %}active{% endif %}">Главная</a>
            <a href="/tournaments" class="{% if '/tournaments' in request.url.path %}active{% endif %}">Турниры</a>
            <a href="/analytics" class="{% if request.url.path == '/analytics' %}active{% endif %}">Аналитика</a>
            <a href="/reports" class="{% if '/reports' in request.url.path %}active{% endif %}">Отчёты</a>
            <a href="/events" class="{% if '/events' in request.url.path %}active{% endif %}">События</a>
            <a href="/scrape-log" class="{% if request.url.path == '/scrape-log' %}active{% endif %}">Лог скрейпа</a>
            <div class="mt-auto p-3">
                <a href="/logout" class="text-muted small">Выход</a>
            </div>
        </nav>
        {% endblock %}

        <main class="flex-fill p-4" style="min-height: 100vh; background: #f5f5f5;">
            {% block content %}{% endblock %}
        </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
