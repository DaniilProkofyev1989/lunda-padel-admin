services:
  - type: web
    name: lunda-admin
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn admin.app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: NEON_AUTH_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.12"
